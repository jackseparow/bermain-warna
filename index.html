<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lab Warna Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #main { display: flex; gap: 20px; width: 1000px; max-width: 95vw; }
        #blocklyDiv { height: 550px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 12px; background: white; }
        #sidebar { width: 280px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview { width: 110px; height: 110px; margin: 15px auto; border-radius: 50%; border: 5px solid #eee; background: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        #hex-display { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; color: #34495e; }
        .bottle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .bottle { width: 60px; height: 80px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; transition: background-color 0.3s; }
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #219150; }
        .info-text { font-size: 11px; color: #7f8c8d; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Taman Numerasi</h2>

    <div id="main">
        <div id="blocklyDiv"></div>
        <div id="sidebar">
            <h3>Hasil Campuran</h3>
            <div id="preview"></div>
            <div id="hex-display">#FFFFFF</div>
            <button onclick="saveToStorage()">Simpan ke Rak</button>
            <hr style="margin: 20px 0;">
            <h4>Rak Botol</h4>
            <div class="bottle-grid">
                <div id="bot-0" class="bottle">1</div>
                <div id="bot-1" class="bottle">2</div>
                <div id="bot-2" class="bottle">3</div>
            </div>
            <p class="info-text">Simpan warna hasil campuranmu, lalu gunakan blok <b>"Ambil Botol"</b> untuk mencampurnya lagi!</p>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_simple"><field name="COL">#ff0000</field></block>
            <block type="color_simple"><field name="COL">#ffff00</field></block>
            <block type="color_simple"><field name="COL">#0000ff</field></block>
            <block type="color_simple"><field name="COL">#ffffff</field></block>
            <block type="color_simple"><field name="COL">#000000</field></block>
        </category>
        <category name="Palet Pencampur" colour="160">
            <block type="color_mixer_ratio"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "color_simple",
            "message0": "%1",
            "args0": [
              {
                "type": "field_dropdown",
                "name": "COL",
                "options": [
                  ["MERAH", "#ff0000"], ["KUNING", "#ffff00"], ["BIRU", "#0000ff"],
                  ["PUTIH", "#ffffff"], ["HITAM", "#000000"]
                ]
              }
            ],
            "output": "Color",
            "colour": "#ff0000"
          },
          {
            "type": "color_mixer_ratio",
            "message0": "campur %1 %2 bagian + %3 %4 bagian",
            "args0": [
              { "type": "input_value", "name": "COLOR1", "check": "Color" },
              { "type": "field_number", "name": "RATIO1", "value": 1, "min": 1 },
              { "type": "input_value", "name": "COLOR2", "check": "Color" },
              { "type": "field_number", "name": "RATIO2", "value": 1, "min": 1 }
            ],
            "output": "Color",
            "colour": 160
          },
          {
            "type": "get_stored_color",
            "message0": "Ambil Botol: %1",
            "args0": [
              {
                "type": "field_dropdown",
                "name": "ID",
                "options": [["1", "0"], ["2", "1"], ["3", "2"]]
              }
            ],
            "output": "Color",
            "colour": 45
          }
        ]);

        // --- 2. LOGIKA UTAMA ---
        const workspace = Blockly.inject('blocklyDiv', { 
            toolbox: document.getElementById('toolbox'),
            trashcan: true 
        });
        
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let lastResult = "#ffffff";

        function getBlockColor(block) {
            if (!block) return "#ffffff";
            
            if (block.type === 'color_simple') {
                const hex = block.getFieldValue('COL');
                block.setColour(hex);
                return hex;
            }

            if (block.type === 'get_stored_color') {
                const id = block.getFieldValue('ID');
                const storedColor = storage[id];
                block.setColour(storedColor); // Blok Ambil Botol ikut berubah warnanya
                return storedColor;
            }
            
            if (block.type === 'color_mixer_ratio') {
                const b1 = block.getInputTargetBlock('COLOR1');
                const b2 = block.getInputTargetBlock('COLOR2');
                const r1 = parseFloat(block.getFieldValue('RATIO1')) || 1;
                const r2 = parseFloat(block.getFieldValue('RATIO2')) || 1;
                
                return mixLogic(getBlockColor(b1), r1, getBlockColor(b2), r2);
            }
            return "#ffffff";
        }

        function mixLogic(c1, r1, c2, r2) {
            const f = h => h.match(/\w\w/g).map(x => parseInt(x, 16));
            const rgb1 = f(c1), rgb2 = f(c2);
            const total = r1 + r2;
            const res = [0,1,2].map(i => Math.floor((rgb1[i]*r1 + rgb2[i]*r2)/total));
            return "#" + res.map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function saveToStorage() {
            const num = prompt("Simpan di botol nomor berapa? (1, 2, atau 3)");
            const id = parseInt(num) - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = lastResult;
                document.getElementById(`bot-${id}`).style.backgroundColor = lastResult;
                // Memicu update agar blok "Ambil Botol" yang sudah ada di workspace langsung berubah warna
                workspace.fireChangeListener(new Blockly.Events.BlockChange());
            }
        }

        workspace.addChangeListener(() => {
            const blocks = workspace.getAllBlocks(false);
            let result = "#ffffff";
            
            blocks.forEach(block => {
                if (!block.getParent()) {
                    result = getBlockColor(block);
                }
            });

            lastResult = result;
            document.getElementById('preview').style.backgroundColor = result;
            document.getElementById('hex-display').innerText = result.toUpperCase();
        });
    </script>
</body>
</html>
