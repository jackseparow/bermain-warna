<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Si Yo: Lab Warna Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        :root {
            --primary-pink: #e91e63;
            --dark-blue: #2c3e50;
            --bg-gray: #fdfafb;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gray); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0; 
            min-height: 100vh;
        }

        /* Header Adaptif */
        #title-container { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 15px; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 1200px; 
        }

        .maskot { height: clamp(60px, 10vw, 100px); width: auto; }

        #title-text-area { display: flex; flex-direction: column; text-align: left; }
        h2 { color: var(--dark-blue); margin: 0; font-size: clamp(1.1em, 4vw, 1.8em); }
        .sub-h2 { color: var(--primary-pink); margin: 5px 0 0 0; font-weight: bold; font-size: clamp(0.8em, 3vw, 1em); }

        #instruction-text { 
            color: #7f8c8d; 
            text-align: center; 
            max-width: 850px; 
            line-height: 1.4; 
            margin-bottom: 15px; 
            font-size: 0.9em;
            padding: 0 10px;
        }

        .highlight { color: var(--primary-pink); font-weight: bold; }

        /* Container Utama Adaptif */
        #main-container { 
            display: flex; 
            flex-direction: row; 
            gap: 15px; 
            width: 100%; 
            max-width: 1200px; 
            height: 70vh; /* Tinggi menyesuaikan layar */
            min-height: 500px;
        }

        #blocklyDiv { 
            flex: 2; 
            border: 3px solid var(--primary-pink); 
            border-radius: 12px; 
            background: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            height: 100%;
        }

        /* Sidebar Adaptif */
        #sidebar { 
            flex: 1; 
            max-width: 320px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 8px solid var(--primary-pink); 
            overflow-y: auto;
        }

        #preview { 
            width: 90px; height: 90px; 
            margin: 10px auto; 
            border-radius: 50%; 
            border: 4px solid #eee; 
            background: #fff; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); 
            transition: background 0.3s; 
        }

        #hex-display { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; color: #34495e; }

        .bottle-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 10px; 
        }

        .bottle { 
            width: 100%; 
            aspect-ratio: 3/4;
            border: 2px solid #333; 
            border-radius: 5px 5px 15px 15px; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: bold; 
            box-shadow: 0 3px 0 #ddd; 
        }

        button { 
            background: var(--primary-pink); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 10px;
            font-size: 0.9em;
        }

        button:active { transform: scale(0.98); }

        /* Media Queries untuk HP/Tablet */
        @media (max-width: 850px) {
            #main-container { flex-direction: column; height: auto; }
            #blocklyDiv { height: 450px; flex: none; }
            #sidebar { max-width: 100%; width: 100%; flex: none; }
            #instruction-text { font-size: 0.8em; }
        }
    </style>
</head>
<body>

    <div id="title-container">
        <img src="maskot-siyo.png" alt="Si Yo" class="maskot">
        <div id="title-text-area">
            <h2>🎨 Si Yo: Lab Warna</h2>
            <p class="sub-h2">BBGP D.I. Yogyakarta</p>
        </div>
    </div>

    <div id="instruction-text">
        <p>Gunakan operasi <span class="highlight">bertumpuk (nesting)</span>! Masukkan blok 'Campur Warna' ke dalam slot blok lainnya untuk membuat ribuan kombinasi baru.</p>
    </div>

    <div id="main-container">
        <div id="blocklyDiv"></div>
        <div id="sidebar">
            <h3 style="margin:0; font-size: 1.1em;">Hasil Campuran</h3>
            <div id="preview"></div>
            <div id="hex-display">#FFFFFF</div>
            <button onclick="saveToStorage()">Simpan ke Rak Botol</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <h4 style="margin:0; font-size: 1em;">Rak Botol Koleksi</h4>
            <div class="bottle-grid">
                <div id="bot-0" class="bottle">Botol 1</div>
                <div id="bot-1" class="bottle">Botol 2</div>
                <div id="bot-2" class="bottle">Botol 3</div>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_simple"></block>
        </category>
        <category name="Palet Pencampur" colour="160">
            <block type="color_mixer_nesting"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script>
        // --- DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "color_simple",
            "message0": "Warna: %1",
            "args0": [{
                "type": "field_dropdown", "name": "COL",
                "options": [
                  ["🔴 MERAH", "#ff0000"], ["🟡 KUNING", "#ffff00"], ["🔵 BIRU", "#0000ff"], ["⚪ PUTIH", "#ffffff"], ["⚫ HITAM", "#000000"]
                ]
            }],
            "output": "Color", "colour": "#ff0000"
          },
          {
            "type": "color_mixer_nesting",
            "message0": "Campur %1 %2 + %3 %4",
            "args0": [
              { "type": "field_number", "name": "RATIO1", "value": 1, "min": 0 },
              { "type": "input_value", "name": "COLOR1", "check": "Color" },
              { "type": "field_number", "name": "RATIO2", "value": 1, "min": 0 },
              { "type": "input_value", "name": "COLOR2", "check": "Color" }
            ],
            "output": "Color", "colour": 160
          },
          {
            "type": "get_stored_color",
            "message0": "Ambil Botol: %1",
            "args0": [{ "type": "field_dropdown", "name": "ID", "options": [["1", "0"], ["2", "1"], ["3", "2"]] }],
            "output": "Color", "colour": 45
          }
        ]);

        const workspace = Blockly.inject('blocklyDiv', { 
            toolbox: document.getElementById('toolbox'), 
            trashcan: true,
            move: { scrollbars: true, drag: true, wheel: true },
            zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 }
        });

        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let lastResult = "#ffffff";

        function getBlockColor(block) {
            if (!block) return null;
            if (block.type === 'color_simple') {
                const val = block.getFieldValue('COL');
                block.setColour(val);
                return val;
            }
            if (block.type === 'get_stored_color') {
                const color = storage[block.getFieldValue('ID')];
                block.setColour(color);
                return color;
            }
            if (block.type === 'color_mixer_nesting') {
                const b1 = block.getInputTargetBlock('COLOR1');
                const b2 = block.getInputTargetBlock('COLOR2');
                const r1 = parseFloat(block.getFieldValue('RATIO1')) || 0;
                const r2 = parseFloat(block.getFieldValue('RATIO2')) || 0;
                
                const c1 = getBlockColor(b1);
                const c2 = getBlockColor(b2);
                
                const result = mixLogic(c1, r1, c2, r2);
                block.setColour(result);
                return result;
            }
            return "#ffffff";
        }

        function mixLogic(c1, r1, c2, r2) {
            if (!c1 && !c2) return "#ffffff";
            if (c1 && !c2) return c1;
            if (!c1 && c2) return c2;

            const f = h => {
                if(h.startsWith('rgb')) {
                    return h.match(/\d+/g).map(Number);
                }
                return h.match(/\w\w/g).map(x => parseInt(x, 16));
            };
            
            const rgb1 = f(c1), rgb2 = f(c2);
            const total = r1 + r2;
            if (total === 0) return "#ffffff";

            const res = [0,1,2].map(i => Math.floor((rgb1[i]*r1 + rgb2[i]*r2)/total));
            return "#" + res.map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function saveToStorage() {
            const num = prompt("Simpan di botol nomor berapa? (1, 2, atau 3)");
            const id = parseInt(num) - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = lastResult;
                document.getElementById(`bot-${id}`).style.backgroundColor = lastResult;
                workspace.fireChangeListener(new Blockly.Events.BlockChange());
            }
        }

        workspace.addChangeListener(() => {
            const blocks = workspace.getAllBlocks(false);
            let result = "#ffffff";
            blocks.forEach(block => {
                if (!block.getParent()) {
                    result = getBlockColor(block) || "#ffffff";
                }
            });
            lastResult = result;
            document.getElementById('preview').style.backgroundColor = result;
            document.getElementById('hex-display').innerText = result.toUpperCase();
        });

        // Resize otomatis saat jendela berubah
        window.addEventListener('resize', () => Blockly.svgResize(workspace));
    </script>
</body>
</html>
