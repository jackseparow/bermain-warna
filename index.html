<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lab Warna Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #main { display: flex; gap: 20px; width: 1000px; max-width: 98vw; }
        #blocklyDiv { height: 600px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 12px; background: white; }
        #sidebar { width: 280px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview { width: 110px; height: 110px; margin: 15px auto; border-radius: 50%; border: 5px solid #eee; background: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        #hex-display { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; color: #34495e; }
        .bottle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .bottle { width: 60px; height: 80px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Taman Numerasi</h2>

    <div id="main">
        <div id="blocklyDiv"></div>
        <div id="sidebar">
            <h3>Hasil Campuran</h3>
            <div id="preview"></div>
            <div id="hex-display">#FFFFFF</div>
            <button onclick="saveToStorage()">Simpan ke Rak</button>
            <hr style="margin: 20px 0;">
            <h4>Rak Botol</h4>
            <div class="bottle-grid">
                <div id="bot-0" class="bottle">1</div>
                <div id="bot-1" class="bottle">2</div>
                <div id="bot-2" class="bottle">3</div>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_simple"><field name="COL">#ff0000</field></block>
            <block type="color_simple"><field name="COL">#ffff00</field></block>
            <block type="color_simple"><field name="COL">#0000ff</field></block>
            <block type="color_simple"><field name="COL">#ffffff</field></block>
            <block type="color_simple"><field name="COL">#000000</field></block>
        </category>
        <category name="Palet Pencampur" colour="160">
            <block type="palet_pencampur"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "color_simple",
            "message0": "%1",
            "args0": [{
                "type": "field_dropdown", "name": "COL",
                "options": [["MERAH", "#ff0000"], ["KUNING", "#ffff00"], ["BIRU", "#0000ff"], ["PUTIH", "#ffffff"], ["HITAM", "#000000"]]
            }],
            "output": "Color", "colour": "#ff0000"
          },
          {
            "type": "palet_pencampur",
            "message0": "PALET PENCAMPUR %1 Satuan: %2 %3 Warna 1: %4 Jumlah: %5 Warna 2: %6 Jumlah: %7 Warna 3: %8 Jumlah: %9 Warna 4: %10 Jumlah: %11 Warna 5: %12 Jumlah: %13",
            "args0": [
              { "type": "input_dummy" },
              { "type": "field_dropdown", "name": "UNIT", "options": [["bagian", "PARTS"], ["persen (%)", "PERCENT"]] },
              { "type": "input_dummy" },
              { "type": "input_value", "name": "C1", "check": "Color" }, { "type": "field_number", "name": "R1", "value": 1, "min": 0 },
              { "type": "input_value", "name": "C2", "check": "Color" }, { "type": "field_number", "name": "R2", "value": 0, "min": 0 },
              { "type": "input_value", "name": "C3", "check": "Color" }, { "type": "field_number", "name": "R3", "value": 0, "min": 0 },
              { "type": "input_value", "name": "C4", "check": "Color" }, { "type": "field_number", "name": "R4", "value": 0, "min": 0 },
              { "type": "input_value", "name": "C5", "check": "Color" }, { "type": "field_number", "name": "R5", "value": 0, "min": 0 }
            ],
            "output": "Color", "colour": 160
          },
          {
            "type": "get_stored_color",
            "message0": "Ambil Botol: %1",
            "args0": [{ "type": "field_dropdown", "name": "ID", "options": [["1", "0"], ["2", "1"], ["3", "2"]] }],
            "output": "Color", "colour": 45
          }
        ]);

        // --- 2. LOGIKA UTAMA ---
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let lastResult = "#ffffff";

        function getBlockData(block) {
            if (!block) return null;
            if (block.type === 'color_simple') {
                const hex = block.getFieldValue('COL');
                block.setColour(hex);
                return hex;
            }
            if (block.type === 'get_stored_color') {
                const c = storage[block.getFieldValue('ID')];
                block.setColour(c);
                return c;
            }
            if (block.type === 'palet_pencampur') {
                let cList = [];
                let rList = [];
                for (let i = 1; i <= 5; i++) {
                    let b = block.getInputTargetBlock('C' + i);
                    let r = parseFloat(block.getFieldValue('R' + i)) || 0;
                    let c = getBlockData(b);
                    if (c && r > 0) {
                        cList.push(c);
                        rList.push(r);
                    }
                }
                return mixLogic(cList, rList);
            }
            return "#ffffff";
        }

        function mixLogic(colors, ratios) {
            if (colors.length === 0) return "#ffffff";
            if (colors.length === 1) return colors[0];

            let rTotal = 0, gTotal = 0, bTotal = 0, ratioSum = 0;
            const f = h => h.match(/\w\w/g).map(x => parseInt(x, 16));

            for (let i = 0; i < colors.length; i++) {
                let rgb = f(colors[i]);
                rTotal += rgb[0] * ratios[i];
                gTotal += rgb[1] * ratios[i];
                bTotal += rgb[2] * ratios[i];
                ratioSum += ratios[i];
            }

            if (ratioSum === 0) return "#ffffff";
            let res = [rTotal, gTotal, bTotal].map(v => Math.floor(v / ratioSum));
            return "#" + res.map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function saveToStorage() {
            const num = prompt("Botol 1, 2, atau 3?");
            const id = parseInt(num) - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = lastResult;
                document.getElementById(`bot-${id}`).style.backgroundColor = lastResult;
                workspace.fireChangeListener(new Blockly.Events.BlockChange());
            }
        }

        workspace.addChangeListener(() => {
            const blocks = workspace.getAllBlocks(false);
            let res = "#ffffff";
            blocks.forEach(b => { if (!b.getParent()) res = getBlockData(b) || "#ffffff"; });
            lastResult = res;
            document.getElementById('preview').style.backgroundColor = res;
            document.getElementById('hex-display').innerText = res.toUpperCase();
        });
    </script>
</body>
</html>
