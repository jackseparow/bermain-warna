<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lab Warna Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #main-container { display: flex; gap: 20px; width: 1000px; max-width: 95vw; }
        #blocklyDiv { height: 500px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 12px; background: white; }
        #sidebar { width: 280px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview { width: 100px; height: 100px; margin: 15px auto; border-radius: 50%; border: 5px solid #eee; background: #fff; }
        .bottle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .bottle { width: 60px; height: 80px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Taman Numerasi (Versi Mandiri)</h2>

    <div id="main-container">
        <div id="blocklyDiv"></div>
        <div id="sidebar">
            <h3>Hasil Campuran</h3>
            <div id="preview"></div>
            <div id="hex-display" style="font-weight: bold; margin-bottom: 15px;">#FFFFFF</div>
            <button onclick="saveToStorage()">Simpan ke Rak</button>
            <div class="bottle-grid">
                <div id="bot-0" class="bottle">1</div>
                <div id="bot-1" class="bottle">2</div>
                <div id="bot-2" class="bottle">3</div>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna" colour="230">
            <block type="color_picker_custom"><field name="COL">#ff0000</field><field name="LABEL">MERAH</field></block>
            <block type="color_picker_custom"><field name="COL">#ffff00</field><field name="LABEL">KUNING</field></block>
            <block type="color_picker_custom"><field name="COL">#0000ff</field><field name="LABEL">BIRU</field></block>
        </category>
        <category name="Numerasi" colour="160">
            <block type="color_mixer_ratio"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "color_picker_custom",
            "message0": "%1 %2",
            "args0": [
              { "type": "field_colour", "name": "COL", "colour": "#ff0000" },
              { "type": "field_label", "name": "LABEL", "text": "WARNA" }
            ],
            "output": "Color",
            "colour": "#ff0000"
          },
          {
            "type": "color_mixer_ratio",
            "message0": "campur %1 %2 bagian + %3 %4 bagian",
            "args0": [
              { "type": "input_value", "name": "COLOR1", "check": "Color" },
              { "type": "field_number", "name": "RATIO1", "value": 1, "min": 1 },
              { "type": "input_value", "name": "COLOR2", "check": "Color" },
              { "type": "field_number", "name": "RATIO2", "value": 1, "min": 1 }
            ],
            "output": "Color",
            "colour": 160
          }
        ]);

        // --- 2. LOGIKA CAMPUR (Tanpa Generator Luar) ---
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let lastResult = "#ffffff";

        function getBlockColor(block) {
            if (!block) return "#ffffff";
            
            // Jika blok adalah pemilih warna langsung
            if (block.type === 'color_picker_custom') {
                const color = block.getFieldValue('COL');
                block.setColour(color); // Bonus: ubah warna blok
                return color;
            }
            
            // Jika blok adalah mixer
            if (block.type === 'color_mixer_ratio') {
                const b1 = block.getInputTargetBlock('COLOR1');
                const b2 = block.getInputTargetBlock('COLOR2');
                const r1 = parseFloat(block.getFieldValue('RATIO1')) || 1;
                const r2 = parseFloat(block.getFieldValue('RATIO2')) || 1;
                
                const c1 = getBlockColor(b1);
                const c2 = getBlockColor(b2);
                
                return mixColorsLogic(c1, r1, c2, r2);
            }
            return "#ffffff";
        }

        function mixColorsLogic(c1, r1, c2, r2) {
            const f = h => h.match(/\w\w/g).map(x => parseInt(x, 16));
            const rgb1 = f(c1), rgb2 = f(c2);
            const t = r1 + r2;
            const res = [0,1,2].map(i => Math.floor((rgb1[i]*r1 + rgb2[i]*r2)/t));
            return "#" + res.map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function saveToStorage() {
            const id = prompt("Botol 1, 2, atau 3?") - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = lastResult;
                document.getElementById(`bot-${id}`).style.backgroundColor = lastResult;
            }
        }

        // --- 3. JALANKAN SECARA OTOMATIS ---
        workspace.addChangeListener(() => {
            // Cari blok teratas yang tidak punya output (biasanya mixer utama)
            const blocks = workspace.getAllBlocks(false);
            let result = "#ffffff";
            
            blocks.forEach(block => {
                // Kita hitung warna dari blok mana pun yang ada di workspace
                if (block.type === 'color_mixer_ratio' || block.type === 'color_picker_custom') {
                    result = getBlockColor(block);
                }
            });

            lastResult = result;
            document.getElementById('preview').style.backgroundColor = result;
            document.getElementById('hex-display').innerText = result.toUpperCase();
        });
    </script>
</body>
</html>
