<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Lab Warna Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #main { display: flex; gap: 20px; width: 1100px; max-width: 98vw; }
        #blocklyDiv { height: 600px; flex-grow: 1; border: 3px solid #2c3e50; border-radius: 12px; background: white; }
        #sidebar { width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #preview { width: 120px; height: 120px; margin: 15px auto; border-radius: 50%; border: 8px solid #eee; background: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        #hex-display { font-weight: bold; font-size: 1.3em; margin-bottom: 10px; color: #2c3e50; font-family: monospace; }
        .bottle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .bottle { width: 65px; height: 85px; border: 2px solid #333; border-radius: 5px 5px 20px 20px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 14px; }
        button:hover { background: #219150; }
        .info { font-size: 12px; color: #666; margin-top: 15px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>🎨 Lab Warna Taman Numerasi</h2>

    <div id="main">
        <div id="blocklyDiv"></div>
        <div id="sidebar">
            <h3>Hasil Campuran</h3>
            <div id="preview"></div>
            <div id="hex-display">#FFFFFF</div>
            <button onclick="saveToStorage()">Simpan ke Rak</button>
            <hr style="margin: 20px 0;">
            <h4>Rak Botol</h4>
            <div class="bottle-grid">
                <div id="bot-0" class="bottle">1</div>
                <div id="bot-1" class="bottle">2</div>
                <div id="bot-2" class="bottle">3</div>
            </div>
            <div class="info">
                <b>Tips Numerasi:</b><br>
                Klik ikon ⚙️ pada blok pencampur untuk menambah jumlah warna yang ingin dicampur!
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Warna Dasar" colour="230">
            <block type="color_simple"><field name="COL">#ff0000</field></block>
            <block type="color_simple"><field name="COL">#ffff00</field></block>
            <block type="color_simple"><field name="COL">#0000ff</field></block>
            <block type="color_simple"><field name="COL">#ffffff</field></block>
            <block type="color_simple"><field name="COL">#000000</field></block>
        </category>
        <category name="Palet Pencampur" colour="160">
            <block type="color_mixer_dynamic"></block>
            <block type="get_stored_color"></block>
        </category>
    </xml>

    <script>
        let storage = ["#ffffff", "#ffffff", "#ffffff"];
        let lastResult = "#ffffff";

        // --- 1. DEFINISI BLOK DINAMIS (MUTATOR) ---
        Blockly.Blocks['color_mixer_dynamic'] = {
            init: function() {
                this.appendDummyInput().appendField("Palet Pencampur");
                this.appendDummyInput()
                    .appendField("Satuan:")
                    .appendField(new Blockly.FieldDropdown([["bagian", "PARTS"], ["persen (%)", "PERCENT"]]), "UNIT");
                this.appendValueInput("COLOR0").setCheck("Color").appendField("Warna 1:");
                this.appendDummyInput().appendField("Jumlah:").appendField(new Blockly.FieldNumber(1, 0), "RATIO0");
                
                this.setMutator(new Blockly.Mutator(['mixer_item']));
                this.itemCount_ = 1;
                this.setOutput(true, "Color");
                this.setColour(160);
            },
            mutationToDom: function() {
                let container = Blockly.utils.xml.createElement('mutation');
                container.setAttribute('items', this.itemCount_);
                return container;
            },
            domToMutation: function(xmlElement) {
                this.itemCount_ = parseInt(xmlElement.getAttribute('items'), 10);
                this.updateShape_();
            },
            decompose: function(workspace) {
                let containerBlock = workspace.newBlock('mixer_container');
                containerBlock.initSvg();
                let connection = containerBlock.getInput('STACK').connection;
                for (let i = 1; i < this.itemCount_; i++) {
                    let itemBlock = workspace.newBlock('mixer_item');
                    itemBlock.initSvg();
                    connection.connect(itemBlock.previousConnection);
                    connection = itemBlock.nextConnection;
                }
                return containerBlock;
            },
            compose: function(containerBlock) {
                let itemBlock = containerBlock.getInputTargetBlock('STACK');
                let connections = [];
                while (itemBlock) {
                    connections.push(itemBlock.valueConnection_);
                    itemBlock = itemBlock.nextConnection && itemBlock.nextConnection.targetBlock();
                }
                this.itemCount_ = connections.length + 1;
                this.updateShape_();
                for (let i = 1; i < this.itemCount_; i++) {
                    Blockly.Mutator.reconnect(connections[i - 1], this, 'COLOR' + i);
                }
            },
            saveConnections: function(containerBlock) {
                let itemBlock = containerBlock.getInputTargetBlock('STACK');
                let i = 1;
                while (itemBlock) {
                    let input = this.getInput('COLOR' + i);
                    itemBlock.valueConnection_ = input && input.connection.targetConnection;
                    i++;
                    itemBlock = itemBlock.nextConnection && itemBlock.nextConnection.targetBlock();
                }
            },
            updateShape_: function() {
                let i = 1;
                while (this.getInput('COLOR' + i)) {
                    this.removeInput('COLOR' + i);
                    this.removeInput('RATIO_LABEL' + i);
                    i++;
                }
                for (let j = 1; j < this.itemCount_; j++) {
                    this.appendValueInput('COLOR' + j).setCheck("Color").appendField("Warna " + (j + 1) + ":");
                    this.appendDummyInput('RATIO_LABEL' + j).appendField("Jumlah:").appendField(new Blockly.FieldNumber(1, 0), 'RATIO' + j);
                }
            }
        };

        Blockly.Blocks['mixer_container'] = {
            init: function() {
                this.setColour(160);
                this.appendDummyInput().appendField("Tambah Warna");
                this.appendStatementInput('STACK');
                this.contextMenu = false;
            }
        };

        Blockly.Blocks['mixer_item'] = {
            init: function() {
                this.setColour(160);
                this.appendDummyInput().appendField("Warna");
                this.setPreviousStatement(true);
                this.setNextStatement(true);
                this.contextMenu = false;
            }
        };

        // Definisi blok lainnya
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "color_simple",
            "message0": "%1",
            "args0": [{
                "type": "field_dropdown", "name": "COL",
                "options": [["MERAH", "#ff0000"], ["KUNING", "#ffff00"], ["BIRU", "#0000ff"], ["PUTIH", "#ffffff"], ["HITAM", "#000000"]]
            }],
            "output": "Color", "colour": "#ff0000"
          },
          {
            "type": "get_stored_color",
            "message0": "Ambil Botol: %1",
            "args0": [{ "type": "field_dropdown", "name": "ID", "options": [["1", "0"], ["2", "1"], ["3", "2"]] }],
            "output": "Color", "colour": 45
          }
        ]);

        // --- 2. LOGIKA PERHITUNGAN ---
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        function getBlockData(block) {
            if (!block) return null;
            if (block.type === 'color_simple') {
                let c = block.getFieldValue('COL');
                block.setColour(c);
                return c;
            }
            if (block.type === 'get_stored_color') {
                let c = storage[block.getFieldValue('ID')];
                block.setColour(c);
                return c;
            }
            if (block.type === 'color_mixer_dynamic') {
                let colors = [];
                let ratios = [];
                for (let i = 0; i < block.itemCount_; i++) {
                    let target = block.getInputTargetBlock('COLOR' + i);
                    let color = getBlockData(target);
                    let ratio = parseFloat(block.getFieldValue('RATIO' + i)) || 0;
                    if (color) {
                        colors.push(color);
                        ratios.push(ratio);
                    }
                }
                return calculateMix(colors, ratios);
            }
            return "#ffffff";
        }

        function calculateMix(colors, ratios) {
            if (colors.length === 0) return "#ffffff";
            if (colors.length === 1) return colors[0];

            let rTotal = 0, gTotal = 0, bTotal = 0, ratioSum = 0;
            const f = h => h.match(/\w\w/g).map(x => parseInt(x, 16));

            for (let i = 0; i < colors.length; i++) {
                let rgb = f(colors[i]);
                rTotal += rgb[0] * ratios[i];
                gTotal += rgb[1] * ratios[i];
                bTotal += rgb[2] * ratios[i];
                ratioSum += ratios[i];
            }

            if (ratioSum === 0) return "#ffffff";
            let res = [rTotal, gTotal, bTotal].map(val => Math.floor(val / ratioSum));
            return "#" + res.map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function saveToStorage() {
            let num = prompt("Simpan di botol nomor berapa? (1-3)");
            let id = parseInt(num) - 1;
            if (id >= 0 && id <= 2) {
                storage[id] = lastResult;
                document.getElementById(`bot-${id}`).style.backgroundColor = lastResult;
                workspace.fireChangeListener(new Blockly.Events.BlockChange());
            }
        }

        workspace.addChangeListener(() => {
            let blocks = workspace.getAllBlocks(false);
            let result = "#ffffff";
            blocks.forEach(block => {
                if (!block.getParent()) result = getBlockData(block) || "#ffffff";
            });
            lastResult = result;
            document.getElementById('preview').style.backgroundColor = result;
            document.getElementById('hex-display').innerText = result.toUpperCase();
        });
    </script>
</body>
</html>
